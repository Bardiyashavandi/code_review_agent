name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v --tb=short
        env:
          # Tests mock all external calls — these only need to be non-empty
          # so module-level validation doesn't raise on import.
          GITHUB_TOKEN: dummy_token_for_ci
          GEMINI_API_KEY: dummy_key_for_ci
          GOOGLE_API_KEY: dummy_key_for_ci
